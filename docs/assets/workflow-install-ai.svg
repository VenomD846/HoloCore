<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">HoloCore installation and AI-client connection workflow</title><desc id="desc">Install the HoloCore wheel, initialize a project World, create local knowledge state and client integrations, reload the AI client, and use commands or MCP tools.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#07111f"/><stop offset="1" stop-color="#12342f"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-opacity=".28"/></filter><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L0 6L9 3z" fill="#5eead4"/></marker><style>.f{font-family:Inter,Segoe UI,Arial,sans-serif}.t{fill:#f8fafc;font-size:32px;font-weight:700}.h{fill:#f8fafc;font-size:18px;font-weight:700}.p{fill:#c9dfdc;font-size:14px}.n{fill:#9dbbb6;font-size:12px}.l{stroke:#5eead4;stroke-width:3;fill:none;marker-end:url(#a)}</style></defs>
  <rect width="1200" height="675" fill="url(#bg)"/><text x="60" y="62" class="f t">Install once, connect every supported AI client</text><text x="60" y="91" class="f p">HoloCore writes only missing integration files and keeps the knowledge World local.</text>
  <g filter="url(#s)"><rect x="55" y="150" width="210" height="120" rx="16" fill="#173456" stroke="#38bdf8"/><text x="160" y="190" text-anchor="middle" class="f h">1. Install package</text><text x="160" y="220" text-anchor="middle" class="f p">uv tool install wheel</text><text x="160" y="245" text-anchor="middle" class="f n">provides holocore + MCP</text></g><path d="M265 210H330" class="l"/>
  <g filter="url(#s)"><rect x="340" y="150" width="230" height="120" rx="16" fill="#113b39" stroke="#2dd4bf"/><text x="455" y="190" text-anchor="middle" class="f h">2. Initialize World</text><text x="455" y="220" text-anchor="middle" class="f p">holocore init</text><text x="455" y="245" text-anchor="middle" class="f n">non-destructive bootstrap</text></g><path d="M570 210H635" class="l"/>
  <g filter="url(#s)"><rect x="645" y="130" width="260" height="160" rx="16" fill="#193a37" stroke="#2dd4bf"/><text x="775" y="171" text-anchor="middle" class="f h">3. Local project setup</text><text x="675" y="205" class="f p">• Git repository</text><text x="675" y="232" class="f p">• Archive + .holocore state</text><text x="675" y="259" class="f p">• commands + MCP configs</text></g><path d="M905 210H970" class="l"/>
  <g filter="url(#s)"><rect x="980" y="150" width="165" height="120" rx="16" fill="#25325f" stroke="#818cf8"/><text x="1062" y="190" text-anchor="middle" class="f h">4. Reload</text><text x="1062" y="220" text-anchor="middle" class="f p">Open the project</text><text x="1062" y="245" text-anchor="middle" class="f n">client discovers tools</text></g>
  <path d="M1062 270V340H200V375" class="l"/><path d="M1062 340H400V375" class="l"/><path d="M1062 340H600V375" class="l"/><path d="M1062 340H800V375" class="l"/><path d="M1062 340V375" class="l"/>
  <g filter="url(#s)"><rect x="100" y="385" width="200" height="90" rx="14" fill="#26345e" stroke="#818cf8"/><text x="200" y="421" text-anchor="middle" class="f h">Codex</text><text x="200" y="447" text-anchor="middle" class="f n">AGENTS + skills + MCP</text></g>
  <g filter="url(#s)"><rect x="310" y="385" width="180" height="90" rx="14" fill="#26345e" stroke="#818cf8"/><text x="400" y="421" text-anchor="middle" class="f h">Claude</text><text x="400" y="447" text-anchor="middle" class="f n">commands + MCP</text></g>
  <g filter="url(#s)"><rect x="500" y="385" width="200" height="90" rx="14" fill="#26345e" stroke="#818cf8"/><text x="600" y="421" text-anchor="middle" class="f h">Cursor</text><text x="600" y="447" text-anchor="middle" class="f n">rules + commands + MCP</text></g>
  <g filter="url(#s)"><rect x="710" y="385" width="180" height="90" rx="14" fill="#26345e" stroke="#818cf8"/><text x="800" y="421" text-anchor="middle" class="f h">Gemini</text><text x="800" y="447" text-anchor="middle" class="f n">commands + MCP</text></g>
  <g filter="url(#s)"><rect x="900" y="385" width="220" height="90" rx="14" fill="#26345e" stroke="#818cf8"/><text x="1010" y="421" text-anchor="middle" class="f h">OpenCode / other</text><text x="1010" y="447" text-anchor="middle" class="f n">commands, MCP, or CLI</text></g>
  <path d="M200 475V525H600" class="l"/><path d="M400 475V525H600" class="l"/><path d="M600 475V525" class="l"/><path d="M800 475V525H600" class="l"/><path d="M1010 475V525H600" class="l"/>
  <g filter="url(#s)"><rect x="395" y="535" width="410" height="95" rx="16" fill="#113b39" stroke="#2dd4bf"/><text x="600" y="571" text-anchor="middle" class="f h">5. Use one HoloCore experience</text><text x="600" y="597" text-anchor="middle" class="f p">search • remember • recall • map • curate</text><text x="600" y="618" text-anchor="middle" class="f n">same engine and local World from every client</text></g>
</svg>
