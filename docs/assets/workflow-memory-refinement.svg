<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">HoloCore chat memory refinement workflow</title><desc id="desc">A chat is saved as a raw audit, distilled with one custom LLM call or a local fallback, split into useful memory types, deduplicated with provenance, and stored in Animus for recall.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#07111f"/><stop offset="1" stop-color="#2a1830"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-opacity=".3"/></filter><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L0 6L9 3z" fill="#f9a8d4"/></marker><style>.f{font-family:Inter,Segoe UI,Arial,sans-serif}.t{fill:#f8fafc;font-size:32px;font-weight:700}.h{fill:#f8fafc;font-size:18px;font-weight:700}.p{fill:#d7c9d8;font-size:14px}.n{fill:#baa7bd;font-size:12px}.l{stroke:#f9a8d4;stroke-width:3;fill:none;marker-end:url(#a)}</style></defs>
  <rect width="1200" height="675" fill="url(#bg)"/><text x="60" y="62" class="f t">Chat → useful memory, without noisy duplication</text><text x="60" y="91" class="f p">Raw evidence is preserved; refined knowledge is stored separately for retrieval.</text>
  <g filter="url(#s)"><rect x="55" y="160" width="185" height="100" rx="16" fill="#24345f" stroke="#818cf8"/><text x="147" y="199" text-anchor="middle" class="f h">1. Chat input</text><text x="147" y="225" text-anchor="middle" class="f n">JSON messages</text></g><path d="M240 210H305" class="l"/>
  <g filter="url(#s)"><rect x="315" y="145" width="220" height="130" rx="16" fill="#3c273b" stroke="#f472b6"/><text x="425" y="184" text-anchor="middle" class="f h">2. Raw audit</text><text x="425" y="211" text-anchor="middle" class="f p">Immutable source copy</text><text x="425" y="237" text-anchor="middle" class="f n">reprocess • verify • trace</text></g><path d="M535 210H600" class="l"/>
  <g filter="url(#s)"><rect x="610" y="135" width="280" height="150" rx="16" fill="#173456" stroke="#38bdf8"/><text x="750" y="175" text-anchor="middle" class="f h">3. One extraction pass</text><text x="750" y="205" text-anchor="middle" class="f p">Custom OpenAI-compatible LLM</text><text x="750" y="231" text-anchor="middle" class="f n">or deterministic local fallback</text><text x="750" y="257" text-anchor="middle" class="f n">custom instructions supported</text></g><path d="M890 210H955" class="l"/>
  <g filter="url(#s)"><rect x="965" y="145" width="185" height="130" rx="16" fill="#4a283e" stroke="#f472b6"/><text x="1057" y="184" text-anchor="middle" class="f h">4. JSON result</text><text x="1057" y="211" text-anchor="middle" class="f p">Structured once</text><text x="1057" y="237" text-anchor="middle" class="f n">no repeated LLM calls</text></g>
  <path d="M1057 275V330H180V365" class="l"/><path d="M1057 330H390V365" class="l"/><path d="M1057 330H600V365" class="l"/><path d="M1057 330H810V365" class="l"/><path d="M1057 330V365" class="l"/>
  <g filter="url(#s)"><rect x="80" y="375" width="200" height="90" rx="14" fill="#39273d" stroke="#f472b6"/><text x="180" y="411" text-anchor="middle" class="f h">Summary</text><text x="180" y="438" text-anchor="middle" class="f n">compact episode</text></g>
  <g filter="url(#s)"><rect x="290" y="375" width="200" height="90" rx="14" fill="#39273d" stroke="#f472b6"/><text x="390" y="411" text-anchor="middle" class="f h">Facts</text><text x="390" y="438" text-anchor="middle" class="f n">durable information</text></g>
  <g filter="url(#s)"><rect x="500" y="375" width="200" height="90" rx="14" fill="#39273d" stroke="#f472b6"/><text x="600" y="411" text-anchor="middle" class="f h">Decisions</text><text x="600" y="438" text-anchor="middle" class="f n">chosen direction</text></g>
  <g filter="url(#s)"><rect x="710" y="375" width="200" height="90" rx="14" fill="#39273d" stroke="#f472b6"/><text x="810" y="411" text-anchor="middle" class="f h">Preferences</text><text x="810" y="438" text-anchor="middle" class="f n">user conventions</text></g>
  <g filter="url(#s)"><rect x="920" y="375" width="200" height="90" rx="14" fill="#39273d" stroke="#f472b6"/><text x="1020" y="411" text-anchor="middle" class="f h">Entities</text><text x="1020" y="438" text-anchor="middle" class="f n">people, tools, projects</text></g>
  <path d="M180 465V515H600" class="l"/><path d="M390 465V515H600" class="l"/><path d="M600 465V515" class="l"/><path d="M810 465V515H600" class="l"/><path d="M1020 465V515H600" class="l"/>
  <g filter="url(#s)"><rect x="400" y="525" width="400" height="100" rx="16" fill="#4a283e" stroke="#f472b6"/><text x="600" y="561" text-anchor="middle" class="f h">5. Animus memory shards</text><text x="600" y="587" text-anchor="middle" class="f p">deduplicate • attach provenance • scope by World/Sector</text><text x="600" y="609" text-anchor="middle" class="f n">ready for recall through CLI or MCP</text></g>
</svg>
