<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">HoloCore unified search workflow</title><desc id="desc">A query is classified once, Archive always runs, Atlas and Animus run only when relevant, and the engine merges source-labelled results without duplicate calls.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#07111f"/><stop offset="1" stop-color="#102744"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-opacity=".28"/></filter><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L0 6L9 3z" fill="#7dd3fc"/></marker><style>.f{font-family:Inter,Segoe UI,Arial,sans-serif}.t{fill:#f8fafc;font-size:32px;font-weight:700}.h{fill:#f8fafc;font-size:18px;font-weight:700}.p{fill:#c8d6e8;font-size:14px}.n{fill:#9fb3ca;font-size:12px}.l{stroke:#7dd3fc;stroke-width:3;fill:none;marker-end:url(#a)}</style></defs>
  <rect width="1200" height="675" fill="url(#bg)"/><text x="60" y="62" class="f t">Unified search: efficient by design</text><text x="60" y="91" class="f p">The Router decides once. Each selected subsystem is called at most once.</text>
  <g filter="url(#s)"><rect x="60" y="160" width="190" height="90" rx="16" fill="#173456" stroke="#38bdf8"/><text x="155" y="196" text-anchor="middle" class="f h">1. Query</text><text x="155" y="220" text-anchor="middle" class="f n">CLI command or MCP tool</text></g>
  <path d="M250 205H340" class="l"/>
  <g filter="url(#s)"><rect x="350" y="145" width="240" height="120" rx="16" fill="#24345f" stroke="#818cf8"/><text x="470" y="183" text-anchor="middle" class="f h">2. Router</text><text x="470" y="208" text-anchor="middle" class="f p">Classify intent once</text><text x="470" y="233" text-anchor="middle" class="f n">structural? historical?</text></g>
  <path d="M590 205H670" class="l"/>
  <g filter="url(#s)"><rect x="680" y="145" width="250" height="120" rx="16" fill="#173456" stroke="#38bdf8"/><text x="805" y="183" text-anchor="middle" class="f h">3. Execution plan</text><text x="805" y="208" text-anchor="middle" class="f p">Archive: always</text><text x="805" y="232" text-anchor="middle" class="f n">Atlas / Animus only if relevant</text></g>
  <path d="M805 265V320H220V355" class="l"/><path d="M805 320H600V355" class="l"/><path d="M805 320H980V355" class="l"/>
  <g filter="url(#s)"><rect x="80" y="365" width="280" height="125" rx="16" fill="#113b39" stroke="#2dd4bf"/><text x="220" y="403" text-anchor="middle" class="f h">Archive search</text><text x="220" y="430" text-anchor="middle" class="f p">Durable notes and decisions</text><text x="220" y="457" text-anchor="middle" class="f n">runs once • always selected</text></g>
  <g filter="url(#s)"><rect x="460" y="365" width="280" height="125" rx="16" fill="#25325f" stroke="#818cf8"/><text x="600" y="403" text-anchor="middle" class="f h">Atlas search</text><text x="600" y="430" text-anchor="middle" class="f p">Files, symbols, dependencies</text><text x="600" y="457" text-anchor="middle" class="f n">runs once • structural queries</text></g>
  <g filter="url(#s)"><rect x="840" y="365" width="280" height="125" rx="16" fill="#4a283e" stroke="#f472b6"/><text x="980" y="403" text-anchor="middle" class="f h">Animus recall</text><text x="980" y="430" text-anchor="middle" class="f p">Prior work, errors, events</text><text x="980" y="457" text-anchor="middle" class="f n">runs once • history queries</text></g>
  <path d="M220 490V535H600" class="l"/><path d="M600 490V535" class="l"/><path d="M980 490V535H600" class="l"/>
  <g filter="url(#s)"><rect x="430" y="545" width="340" height="85" rx="16" fill="#16345a" stroke="#38bdf8"/><text x="600" y="578" text-anchor="middle" class="f h">4. Merge + source labels</text><text x="600" y="603" text-anchor="middle" class="f n">cache result • return one coherent answer set</text></g>
</svg>
