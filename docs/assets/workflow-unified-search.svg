<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">HoloCore check-first retrieval workflow</title><desc id="desc">HoloCore checks readiness and Atlas freshness, then searches Atlas, corresponding Archive notes, optional Animus history, and finally exact source files. Every stage runs at most once with no route loops.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#07111f"/><stop offset="1" stop-color="#102744"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-opacity=".28"/></filter><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L0 6L9 3z" fill="#7dd3fc"/></marker><style>.f{font-family:Inter,Segoe UI,Arial,sans-serif}.t{fill:#f8fafc;font-size:32px;font-weight:700}.h{fill:#f8fafc;font-size:18px;font-weight:700}.p{fill:#c8d6e8;font-size:14px}.n{fill:#9fb3ca;font-size:12px}.l{stroke:#7dd3fc;stroke-width:3;fill:none;marker-end:url(#a)}</style></defs>
  <rect width="1200" height="675" fill="url(#bg)"/><text x="60" y="62" class="f t">Check first, then retrieve in one direction</text><text x="60" y="91" class="f p">Atlas → corresponding Archive notes → relevant Animus history → exact source files</text>
  <g filter="url(#s)"><rect x="55" y="145" width="185" height="120" rx="16" fill="#173456" stroke="#38bdf8"/><text x="147" y="181" text-anchor="middle" class="f h">Question</text><text x="147" y="209" text-anchor="middle" class="f p">one request enters</text><text x="147" y="235" text-anchor="middle" class="f n">CLI, command, or MCP</text></g><path d="M240 205H290" class="l"/>
  <g filter="url(#s)"><rect x="300" y="130" width="235" height="150" rx="16" fill="#173456" stroke="#38bdf8"/><text x="417" y="168" text-anchor="middle" class="f h">1. Check first</text><text x="417" y="197" text-anchor="middle" class="f p">folders + configuration</text><text x="417" y="223" text-anchor="middle" class="f p">Atlas freshness</text><text x="417" y="251" text-anchor="middle" class="f n">report missing/stale; do not auto-write</text></g><path d="M535 205H585" class="l"/>
  <g filter="url(#s)"><rect x="595" y="130" width="235" height="150" rx="16" fill="#25325f" stroke="#818cf8"/><text x="712" y="168" text-anchor="middle" class="f h">2. Atlas first</text><text x="712" y="197" text-anchor="middle" class="f p">find relevant files</text><text x="712" y="223" text-anchor="middle" class="f p">symbols + relationships</text><text x="712" y="251" text-anchor="middle" class="f n">creates the narrow project scope</text></g><path d="M830 205H880" class="l"/>
  <g filter="url(#s)"><rect x="890" y="130" width="255" height="150" rx="16" fill="#113b39" stroke="#2dd4bf"/><text x="1017" y="168" text-anchor="middle" class="f h">3. Archive second</text><text x="1017" y="197" text-anchor="middle" class="f p">search corresponding notes</text><text x="1017" y="223" text-anchor="middle" class="f p">rules + verified decisions</text><text x="1017" y="251" text-anchor="middle" class="f n">one bounded wiki lookup</text></g>
  <path d="M1017 280V335H760V370" class="l"/>
  <g filter="url(#s)"><rect x="625" y="380" width="270" height="135" rx="16" fill="#4a283e" stroke="#f472b6"/><text x="760" y="418" text-anchor="middle" class="f h">4. Animus third</text><text x="760" y="447" text-anchor="middle" class="f p">only when history matters</text><text x="760" y="473" text-anchor="middle" class="f n">previous work • errors • chats</text><text x="760" y="495" text-anchor="middle" class="f n">one scoped memory lookup</text></g>
  <path d="M625 447H550" class="l"/>
  <g filter="url(#s)"><rect x="280" y="380" width="260" height="135" rx="16" fill="#16345a" stroke="#38bdf8"/><text x="410" y="418" text-anchor="middle" class="f h">5. Exact sources</text><text x="410" y="447" text-anchor="middle" class="f p">open only identified files</text><text x="410" y="473" text-anchor="middle" class="f n">merge + label the evidence</text><text x="410" y="495" text-anchor="middle" class="f n">send smaller context to the AI</text></g>
  <path d="M280 447H205V535H410" class="l"/>
  <g filter="url(#s)"><rect x="420" y="545" width="360" height="82" rx="16" fill="#173456" stroke="#38bdf8"/><text x="600" y="578" text-anchor="middle" class="f h">One focused result</text><text x="600" y="603" text-anchor="middle" class="f n">each stage runs at most once • no recursive route • no loop</text></g>
  <path d="M760 515V535H780" class="l"/>
  <text x="1005" y="395" text-anchor="middle" class="f p">History not relevant?</text><path d="M1017 405V535H780" class="l"/><text x="1017" y="430" text-anchor="middle" class="f n">skip Animus</text>
</svg>
